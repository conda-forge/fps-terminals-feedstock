schema_version: 1

context:
  version: "0.10.1"

package:
  name: fps-terminals
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/f/fps-terminals/fps_terminals-${{ version }}.tar.gz
    sha256: 6cc15cf2583c9e2a55e874ea03b10cb23828ebcadbad18590cebbf0ed7d038c0

build:
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python
    - pip
    - uv-build
  run:
    - python
    - jupyverse-api >=0.14.0,<0.15.0
    - if: win
      then:
        - pywinpty

tests:
  - python:
      imports: fps_terminals
      pip_check: true

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/plugins/terminals
  summary: An FPS plugin for the terminals API

extra:
  recipe-maintainers:
    - davidbrochart
