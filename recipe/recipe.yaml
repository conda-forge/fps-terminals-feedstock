schema_version: 1

context:
  version: "0.9.7"

package:
  name: fps-terminals
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/f/fps-terminals/fps_terminals-${{ version }}.tar.gz
    sha256: 800076de7fda13bf9535b25c6b33d73e13e0088505902c4aa25f08ede02778ce

build:
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - jupyverse-api >=0.14.0,<0.15.0
    - if: win
      then:
        - pywinpty

tests:
  - python:
      imports: fps_terminals
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/plugins/terminals
  summary: An FPS plugin for the terminals API

extra:
  recipe-maintainers:
    - davidbrochart
